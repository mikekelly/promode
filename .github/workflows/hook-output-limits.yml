name: hook-output-limits

# Enforces the design constraint (see CLAUDE.md): every promode hook output string must
# stay under Claude Code's 10,000-char cap, or the brief is silently truncated on delivery.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq
        run: command -v jq >/dev/null || sudo apt-get update && sudo apt-get install -y jq
      - name: Check hook output sizes
        run: ./scripts/check-hook-output-limits.sh
