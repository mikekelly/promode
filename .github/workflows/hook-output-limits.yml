name: hook-output-limits

# Enforces the hook-delivery design constraints (see CLAUDE.md): the main-agent brief must
# stay under Claude Code's 10,000-char cap (no silent truncation), must reach the MAIN agent
# only (agent_id gating), and must be fully chunk-registered (no silently dropped tail).
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq
        run: command -v jq >/dev/null || sudo apt-get update && sudo apt-get install -y jq
      - name: Check hook-delivery invariants
        run: ./scripts/check-hooks.sh
      # Unit-test the checkers themselves: a regression in checker LOGIC (a check that
      # stops catching what it should) would pass check-hooks.sh silently, since that
      # only runs the checks against the live corpus. These self-tests feed each checker
      # known-good and known-bad fixtures and assert it passes/fails correctly.
      - name: Test the checkers
        run: |
          ./scripts/test-check-claude-md-imports.sh
          ./scripts/test-check-component-frontmatter.sh
          ./scripts/test-check-shared-principle-checksums.sh
      # Unit-test the context-monitor Stop hook's pure logic (occupancy %, rank ladder,
      # transcript-derived level-triggered debounce, loop guard, prompt discriminator).
      - name: Test the context-monitor hook
        run: ./scripts/test-context-monitor.sh
