name: hook-output-limits

# Enforces the hook-delivery design constraints (see CLAUDE.md): the main-agent brief must
# stay under Claude Code's 10,000-char cap (no silent truncation), must reach the MAIN agent
# only (agent_id gating), and must be fully chunk-registered (no silently dropped tail).
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq
        run: command -v jq >/dev/null || sudo apt-get update && sudo apt-get install -y jq
      - name: Check hook-delivery invariants
        run: ./scripts/check-hooks.sh
